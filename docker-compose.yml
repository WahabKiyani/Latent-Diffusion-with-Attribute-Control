# ==============================================================================
# Docker Compose Configuration
# Simplifies deployment with proper GPU passthrough
# ==============================================================================

services:
  latent-diffusion-app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: attribute-control-system

    # GPU support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

    # Port mapping
    ports:
      - "7860:7860"

    # Volume mounts
    volumes:
      - ./pretrained:/app/pretrained:ro
      - ./outputs:/app/outputs

    # Environment variables
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:7860" ]
      interval: 30s
      timeout: 10s
      retries: 3
